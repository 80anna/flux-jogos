<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <title>Sinuca Pro</title>
        <style>
            body {
                background: #1a1a1a;
                color: white;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
                font-family: sans-serif;
                overflow: hidden;
            }
            canvas {
                background: #2c2c2cff;
                cursor: crosshair;
            }
            .score {
                position: absolute;
                top: 20px;
                left: 20px;
                font-size: 1.5rem;
                color: #ffffffff;
                z-index: 10;
            }
            .reset-btn {
                position: absolute;
                top: 20px;
                right: 20px;
                padding: 10px 20px;
                font-size: 1rem;
                background: #d32f2f;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                z-index: 10;
            }
            .reset-btn:hover {
                background: #b71c1c;
            }
        </style>
    </head>
    <body>
        <div class="score">Pontos: <span id="points">0</span></div>
        <button class="reset-btn" onclick="sendMessage(JSON.stringify({type: 'reset'}))">Reiniciar partida</button>
        <canvas id="poolTable"></canvas>

        <script>
            let ws;
            const canvas = document.getElementById("poolTable");
            const ctx = canvas.getContext("2d");
            const pointsSpan = document.getElementById("points");

            let points = 0;
            let isDragging = false;
            let mousePos = { x: 0, y: 0 };
            const ballRadius = 12;

            let serverBalls = [];
            let displayBalls = [];

            let table = null;
            let pockets = [];
            let cushions = [];
            let staticBallsMap = {};

            let canvasOffsetX = 0;
            let canvasOffsetY = 0;
            const SCENE_W = 900;
            const SCENE_H = 500;

            function updateCanvasSize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvasOffsetX = Math.floor((canvas.width - SCENE_W) / 2);
                canvasOffsetY = Math.floor((canvas.height - SCENE_H) / 2);
            }
            updateCanvasSize();
            window.addEventListener("resize", updateCanvasSize);

            function connect() {
                ws = new WebSocket("ws://46.225.166.37:1234/ws");
                ws.binaryType = "arraybuffer";

                ws.onopen = function () {
                    console.log("Connected to WebSocket server");
                };

                ws.onmessage = function (event) {
                    if (event.data instanceof ArrayBuffer) {
                        const view = new DataView(event.data);
                        
                        const newPoints = view.getUint32(0, true);
                        const numActiveBalls = view.getUint16(4, true);
                        
                        let offset = 6;
                        const activeIds = new Set();
                        for (let i = 0; i < numActiveBalls; i++) {
                            activeIds.add(view.getUint16(offset, true));
                            offset += 2;
                        }
                        
                        const numUpdatedBalls = view.getUint16(offset, true);
                        offset += 2;
                        
                        const updates = {};
                        for (let i = 0; i < numUpdatedBalls; i++) {
                            const id = view.getUint16(offset, true);
                            const x = view.getFloat32(offset + 2, true);
                            const y = view.getFloat32(offset + 6, true);
                            const vx = view.getFloat32(offset + 10, true);
                            const vy = view.getFloat32(offset + 14, true);
                            
                            updates[id] = { x, y, vx, vy };
                            offset += 18;
                        }
                        
                        serverBalls = serverBalls.filter(b => activeIds.has(b.id));
                        
                        const serverBallsMap = {};
                        for (let b of serverBalls) {
                            serverBallsMap[b.id] = b;
                        }

                        for (const idStr in updates) {
                            const id = parseInt(idStr);
                            const u = updates[id];
                            if (serverBallsMap[id]) {
                                serverBallsMap[id].x = u.x;
                                serverBallsMap[id].y = u.y;
                                serverBallsMap[id].vx = u.vx;
                                serverBallsMap[id].vy = u.vy;
                            } else {
                                const sb = staticBallsMap[id] || {};
                                serverBalls.push({
                                    id: id,
                                    x: u.x,
                                    y: u.y,
                                    vx: u.vx,
                                    vy: u.vy,
                                    color: sb.color,
                                    isWhite: sb.isWhite
                                });
                            }
                        }
                        
                        points = newPoints;
                        if (pointsSpan) pointsSpan.innerText = points;
                        return;
                    }

                    const msg = JSON.parse(event.data);

                    if (msg.type === "init") {
                        table = msg.table;
                        pockets = msg.pockets;
                        cushions = msg.cushions.map((c) =>
                            c.map((p) => [p.x, p.y]),
                        );
                        if (msg.staticBalls) {
                            msg.staticBalls.forEach((sb) => {
                                staticBallsMap[sb.id] = sb;
                            });
                        }
                    }

                    if (msg.state) {
                        const mergedBalls = msg.state.balls.map((b) => {
                            const sb = staticBallsMap[b.id] || {};
                            return {
                                ...b,
                                color: sb.color,
                                isWhite: sb.isWhite,
                            };
                        });

                        if (displayBalls.length === 0) {
                            displayBalls = mergedBalls.map((b) => ({
                                ...b,
                            }));
                        }
                        serverBalls = mergedBalls;
                        points = msg.state.points;
                        if (pointsSpan) pointsSpan.innerText = points;
                    }
                };

                ws.onclose = function () {
                    console.log("WebSocket connection closed, retrying...");
                    setTimeout(connect, 1000);
                };

                ws.onerror = function (error) {
                    console.error("WebSocket error:", error);
                };
            }

            function sendMessage(message) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(message);
                }
            }

            connect();

            // Interpolação suave em direção ao estado do servidor
            function interpolate() {
                const lerpFactor = 0.3;

                // Se o número de bolas mudou (encaçapamento), sincroniza direto
                if (displayBalls.length !== serverBalls.length) {
                    displayBalls = serverBalls.map((b) => ({ ...b }));
                    return;
                }

                for (let i = 0; i < displayBalls.length; i++) {
                    const d = displayBalls[i];
                    const s = serverBalls[i];
                    if (d.id !== s.id) {
                        displayBalls = serverBalls.map((b) => ({ ...b }));
                        return;
                    }
                    d.x += (s.x - d.x) * lerpFactor;
                    d.y += (s.y - d.y) * lerpFactor;
                    d.color = s.color;
                    d.isWhite = s.isWhite;
                }
            }

            // Mousedown: começa a arrastar apenas se a bola branca estiver parada
            canvas.addEventListener("mousedown", () => {
                const whiteBall = serverBalls.find((b) => b.isWhite);
                if (whiteBall && Math.hypot(whiteBall.vx, whiteBall.vy) < 0.2) {
                    isDragging = true;
                }
            });

            window.addEventListener("mousemove", (e) => {
                const rect = canvas.getBoundingClientRect();
                // Desconta o offset para que as coordenadas fiquem no espaço do jogo
                mousePos = {
                    x: e.clientX - rect.left - canvasOffsetX,
                    y: e.clientY - rect.top - canvasOffsetY,
                };
            });

            // Mouseup: envia tacada ao servidor
            window.addEventListener("mouseup", () => {
                if (isDragging) {
                    const whiteBall = serverBalls.find((b) => b.isWhite);
                    if (whiteBall) {
                        const angle = Math.atan2(
                            mousePos.y - whiteBall.y,
                            mousePos.x - whiteBall.x,
                        );
                        const dist = Math.min(
                            Math.hypot(
                                whiteBall.x - mousePos.x,
                                whiteBall.y - mousePos.y,
                            ),
                            200,
                        );
                        const vx = Math.cos(angle + Math.PI) * dist * 0.16;
                        const vy = Math.sin(angle + Math.PI) * dist * 0.16;
                        sendMessage(JSON.stringify({ type: "shot", vx, vy }));
                    }
                    isDragging = false;
                }
            });

            // Loop principal: apenas interpolação + desenho
            function update() {
                interpolate();
                draw();
                requestAnimationFrame(update);
            }

            function draw() {
                if (!table) return;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                ctx.translate(canvasOffsetX, canvasOffsetY);

                // 1. Moldura
                ctx.fillStyle = table.railColor;
                ctx.beginPath();
                ctx.roundRect(
                    table.x - table.borderThickness,
                    table.y - table.borderThickness,
                    table.w + table.borderThickness * 2,
                    table.h + table.borderThickness * 2,
                    10,
                );
                ctx.fill();

                // 2. Pano base estendido (Polígono que cobre a mesa e entra nas caçapas)
                ctx.fillStyle = table.clothColor;
                ctx.beginPath();
                ctx.moveTo(cushions[0][0][0], cushions[0][0][1]);
                ctx.lineTo(cushions[0][3][0], cushions[0][3][1]);
                ctx.lineTo(cushions[1][0][0], cushions[1][0][1]);
                ctx.lineTo(cushions[1][3][0], cushions[1][3][1]);
                ctx.lineTo(cushions[5][0][0], cushions[5][0][1]);
                ctx.lineTo(cushions[5][3][0], cushions[5][3][1]);
                ctx.lineTo(cushions[3][3][0], cushions[3][3][1]);
                ctx.lineTo(cushions[3][0][0], cushions[3][0][1]);
                ctx.lineTo(cushions[2][3][0], cushions[2][3][1]);
                ctx.lineTo(cushions[2][0][0], cushions[2][0][1]);
                ctx.lineTo(cushions[4][3][0], cushions[4][3][1]);
                ctx.lineTo(cushions[4][0][0], cushions[4][0][1]);
                ctx.closePath();
                ctx.fill();

                // 3. Caçapas
                pockets.forEach((p) => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, table.pocketSize, 0, Math.PI * 2);
                    const grad = ctx.createRadialGradient(
                        p.x,
                        p.y,
                        0,
                        p.x,
                        p.y,
                        table.pocketSize,
                    );
                    grad.addColorStop(0, "#000");
                    grad.addColorStop(1, "#222");
                    ctx.fillStyle = grad;
                    ctx.fill();
                });

                // 3.5 Bordas (Cushions)
                ctx.save();

                // Define a área de clip igual ao pano estendido para evitar que a sombra vaze para a madeira
                ctx.beginPath();
                ctx.moveTo(cushions[0][0][0], cushions[0][0][1]);
                ctx.lineTo(cushions[0][3][0], cushions[0][3][1]);
                ctx.lineTo(cushions[1][0][0], cushions[1][0][1]);
                ctx.lineTo(cushions[1][3][0], cushions[1][3][1]);
                ctx.lineTo(cushions[5][0][0], cushions[5][0][1]);
                ctx.lineTo(cushions[5][3][0], cushions[5][3][1]);
                ctx.lineTo(cushions[3][3][0], cushions[3][3][1]);
                ctx.lineTo(cushions[3][0][0], cushions[3][0][1]);
                ctx.lineTo(cushions[2][3][0], cushions[2][3][1]);
                ctx.lineTo(cushions[2][0][0], cushions[2][0][1]);
                ctx.lineTo(cushions[4][3][0], cushions[4][3][1]);
                ctx.lineTo(cushions[4][0][0], cushions[4][0][1]);
                ctx.closePath();
                ctx.clip();

                // Aplica a sombra apenas dentro da área do pano
                ctx.shadowColor = "rgba(0, 0, 0, 0.25)";
                ctx.shadowBlur = 20;
                ctx.shadowOffsetX = 8;
                ctx.shadowOffsetY = 8;

                ctx.fillStyle = table.clothColor;
                cushions.forEach((pts) => {
                    ctx.beginPath();
                    ctx.moveTo(pts[0][0], pts[0][1]);
                    for (let i = 1; i < pts.length; i++) {
                        ctx.lineTo(pts[i][0], pts[i][1]);
                    }
                    ctx.closePath();
                    ctx.fill();
                });
                ctx.restore(); // Remove o clip e a sombra

                // Desenha a linha da borda (stroke) sem clip para não cortar a espessura ao meio
                ctx.strokeStyle = "#2e59b4ff";
                ctx.lineWidth = 2;
                ctx.lineJoin = "round";
                cushions.forEach((pts) => {
                    ctx.beginPath();
                    ctx.moveTo(pts[0][0], pts[0][1]);
                    for (let i = 1; i < pts.length; i++) {
                        ctx.lineTo(pts[i][0], pts[i][1]);
                    }
                    ctx.closePath();
                    ctx.stroke();
                });

                const whiteBall = displayBalls.find((b) => b.isWhite);
                const serverWhite = serverBalls.find((b) => b.isWhite);

                // 4. Bolas
                displayBalls.forEach((b) => {
                    ctx.save();
                    ctx.shadowColor = "rgba(0,0,0,0.4)";
                    ctx.shadowBlur = 4;
                    ctx.shadowOffsetX = 3;
                    ctx.shadowOffsetY = 3;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, ballRadius, 0, Math.PI * 2);
                    const grad = ctx.createRadialGradient(
                        b.x - 4,
                        b.y - 4,
                        2,
                        b.x,
                        b.y,
                        ballRadius,
                    );
                    grad.addColorStop(0, "white");
                    grad.addColorStop(0.2, b.isWhite ? "#fff" : b.color);
                    grad.addColorStop(1, b.isWhite ? "#bbb" : "#000");
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.restore();
                });

                // 5. Taco + linha de mira (usa posição interpolada, mas velocidade autoritativa)
                if (
                    whiteBall &&
                    serverWhite &&
                    serverWhite.vx === 0 &&
                    serverWhite.vy === 0
                ) {
                    const angle = Math.atan2(
                        mousePos.y - whiteBall.y,
                        mousePos.x - whiteBall.x,
                    );
                    const dist = Math.hypot(
                        mousePos.x - whiteBall.x,
                        mousePos.y - whiteBall.y,
                    );
                    const offset = isDragging ? dist * 0.15 + 14 : 16;

                    // Linha de mira: na direção oposta ao taco (para onde a bola vai)
                    const aimAngle = angle + Math.PI;
                    const aimLength = 600;
                    const aimGrad = ctx.createLinearGradient(
                        whiteBall.x + Math.cos(aimAngle) * ballRadius,
                        whiteBall.y + Math.sin(aimAngle) * ballRadius,
                        whiteBall.x + Math.cos(aimAngle) * aimLength,
                        whiteBall.y + Math.sin(aimAngle) * aimLength,
                    );
                    aimGrad.addColorStop(0, "rgba(255, 255, 255, 0.6)");
                    aimGrad.addColorStop(1, "rgba(255, 255, 255, 0)");

                    ctx.save();
                    ctx.setLineDash([8, 8]);
                    ctx.lineWidth = 1.5;
                    ctx.strokeStyle = aimGrad;
                    ctx.beginPath();
                    ctx.moveTo(
                        whiteBall.x + Math.cos(aimAngle) * (ballRadius + 2),
                        whiteBall.y + Math.sin(aimAngle) * (ballRadius + 2),
                    );
                    ctx.lineTo(
                        whiteBall.x + Math.cos(aimAngle) * aimLength,
                        whiteBall.y + Math.sin(aimAngle) * aimLength,
                    );
                    ctx.stroke();
                    ctx.restore();

                    // Taco
                    ctx.save();
                    ctx.translate(whiteBall.x, whiteBall.y);
                    ctx.rotate(angle);
                    ctx.shadowColor = "rgba(0,0,0,0.5)";
                    ctx.shadowBlur = 10;
                    ctx.shadowOffsetY = 6;

                    const cueGrad = ctx.createLinearGradient(
                        offset,
                        0,
                        offset + 300,
                        0,
                    );
                    cueGrad.addColorStop(0, "#3e2723");
                    cueGrad.addColorStop(0.1, "#8d6e63");
                    cueGrad.addColorStop(1, "#211512");

                    ctx.fillStyle = cueGrad;
                    ctx.fillRect(offset, -3.5, 300, 7);
                    ctx.fillStyle = "#0288d1";
                    ctx.fillRect(offset, -3.5, 4, 7);
                    ctx.restore();
                }

                // Fecha o translate principal
                ctx.restore();
            }

            update();
        </script>
    </body>
</html>
