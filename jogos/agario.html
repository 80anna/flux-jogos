<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bolinha de Energia - Com Obstáculos</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        background: #050816;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
        background: radial-gradient(circle at center, #0b1736 0%, #050816 70%);
    }

    .hud {
        position: fixed;
        top: 15px;
        left: 15px;
        color: white;
        z-index: 10;
        font-size: 18px;
        text-shadow: 0 0 10px black;
    }
</style>
</head>
<body>

<div class="hud">
    <div id="sizeText">Tamanho: 20</div>
    <div id="dashText">Dash: Pronto</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const world = {
    width: 5000,
    height: 5000
};

const keys = {};

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

function rand(min, max) {
    return Math.random() * (max - min) + min;
}

// --- CLASSE NOVA: BARRA/OBSTÁCULO ---
class Wall {
    constructor() {
        this.width = rand(100, 400); // Largura aleatória
        this.height = rand(20, 40);  // Espessura
        // Alterna entre horizontal e vertical
        if (Math.random() > 0.5) {
            [this.width, this.height] = [this.height, this.width];
        }
        this.x = rand(0, world.width - this.width);
        this.y = rand(0, world.height - this.height);
        this.color = "#ff8c00"; // Laranja para perigo
    }

    draw(camera) {
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.fillRect(
            (this.x - camera.x) * camera.zoom,
            (this.y - camera.y) * camera.zoom,
            this.width * camera.zoom,
            this.height * camera.zoom
        );
        ctx.restore();
    }

    checkCollision(player) {
        // Lógica de colisão: Círculo vs Retângulo
        let closestX = Math.max(this.x, Math.min(player.x, this.x + this.width));
        let closestY = Math.max(this.y, Math.min(player.y, this.y + this.height));

        let distanceX = player.x - closestX;
        let distanceY = player.y - closestY;
        let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

        return distanceSquared < (player.radius * player.radius);
    }
}

class Particle {
    constructor() {
        this.x = rand(0, world.width);
        this.y = rand(0, world.height);
        this.radius = rand(3, 7);
        this.energy = rand(1, 3);
        this.color = `hsl(${rand(180, 320)}, 100%, 60%)`;
    }

    draw(camera) {
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.arc(
            (this.x - camera.x) * camera.zoom,
            (this.y - camera.y) * camera.zoom,
            this.radius * camera.zoom,
            0,
            Math.PI * 2
        );
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class DrainEnemy {
    constructor() {
        this.x = rand(0, world.width);
        this.y = rand(0, world.height);
        this.radius = rand(18, 28);
        this.speed = rand(0.8, 1.4);
        this.color = "#9b59ff";
    }

    update(player) {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.hypot(dx, dy);

        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;

        if (dist < player.radius + this.radius) {
            player.radius *= 0.7;
            if (player.radius < 18) gameOver = true;
            this.x = rand(0, world.width);
            this.y = rand(0, world.height);
        }
    }

    draw(camera) {
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 35;
        ctx.shadowColor = this.color;
        ctx.arc(
            (this.x - camera.x) * camera.zoom,
            (this.y - camera.y) * camera.zoom,
            this.radius * camera.zoom,
            0,
            Math.PI * 2
        );
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.7)";
        ctx.lineWidth = 3 * camera.zoom;
        ctx.arc(
            (this.x - camera.x) * camera.zoom,
            (this.y - camera.y) * camera.zoom,
            (this.radius + 6) * camera.zoom,
            0,
            Math.PI * 2
        );
        ctx.stroke();
    }
}

class Enemy {
    constructor() {
        this.x = rand(0, world.width);
        this.y = rand(0, world.height);
        this.radius = rand(15, 35);
        this.speed = rand(0.5, 1.1);
        this.color = "#ff3b3b";
    }

    update(player) {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.hypot(dx, dy);

        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;

        if (dist < player.radius + this.radius) {
            if (player.radius > this.radius) {
                player.radius += this.radius * 0.08;
                this.x = rand(0, world.width);
                this.y = rand(0, world.height);
                this.radius = rand(15 + difficultyLevel, 35 + difficultyLevel * 1.5);
            } else {
                gameOver = true;
            }
        }
    }

    draw(camera) {
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 30;
        ctx.shadowColor = this.color;
        ctx.arc(
            (this.x - camera.x) * camera.zoom,
            (this.y - camera.y) * camera.zoom,
            this.radius * camera.zoom,
            0,
            Math.PI * 2
        );
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Player {
    constructor() {
        this.x = world.width / 2;
        this.y = world.height / 2;
        this.radius = 20;
        this.speed = 4;
        this.color = "#4de1ff";
        this.dashPower = 16;
        this.dashCooldown = 1000;
        this.lastDash = 0;
        this.velX = 0;
        this.velY = 0;
    }

    update() {
        let moveX = 0;
        let moveY = 0;
        if (keys["w"]) moveY -= 1;
        if (keys["s"]) moveY += 1;
        if (keys["a"]) moveX -= 1;
        if (keys["d"]) moveX += 1;

        const len = Math.hypot(moveX, moveY);
        if (len > 0) {
            moveX /= len;
            moveY /= len;
        }

        let currentSpeed = this.speed / Math.sqrt(this.radius / 20);

        if (keys[" "]) {
            const now = Date.now();
            if (now - this.lastDash > this.dashCooldown) {
                this.velX = moveX * this.dashPower;
                this.velY = moveY * this.dashPower;
                this.lastDash = now;
            }
        }

        this.velX *= 0.90;
        this.velY *= 0.90;

        this.x += moveX * currentSpeed + this.velX;
        this.y += moveY * currentSpeed + this.velY;

        this.x = Math.max(this.radius, Math.min(world.width - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(world.height - this.radius, this.y));
    }

    draw(camera) {
        const screenX = (this.x - camera.x) * camera.zoom;
        const screenY = (this.y - camera.y) * camera.zoom;

        const gradient = ctx.createRadialGradient(
            screenX, screenY, this.radius * 0.2 * camera.zoom,
            screenX, screenY, this.radius * 1.2 * camera.zoom
        );

        gradient.addColorStop(0, "#ffffff");
        gradient.addColorStop(0.4, "#69f0ff");
        gradient.addColorStop(1, "#009dff");

        ctx.beginPath();
        ctx.fillStyle = gradient;
        ctx.shadowBlur = 50;
        ctx.shadowColor = "#4de1ff";
        ctx.arc(screenX, screenY, this.radius * camera.zoom, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(77,225,255,${0.25 - i * 0.07})`;
            ctx.lineWidth = 8 * camera.zoom;
            ctx.arc(screenX, screenY, (this.radius + 10 + i * 12) * camera.zoom, 0, Math.PI * 2);
            ctx.stroke();
        }
    }
}

// --- INICIALIZAÇÃO ---
const player = new Player();
const particles = [];
const enemies = [];
const drainEnemies = [];
const walls = []; // Array de barras

function initGame() {
    particles.length = 0;
    for (let i = 0; i < 700; i++) particles.push(new Particle());

    enemies.length = 0;
    for (let i = 0; i < 12; i++) enemies.push(new Enemy());

    drainEnemies.length = 0;
    for (let i = 0; i < 5; i++) drainEnemies.push(new DrainEnemy());

    walls.length = 0;
    for (let i = 0; i < 40; i++) walls.push(new Wall()); // Cria 40 barras avulsas
}

initGame();

let difficultyLevel = 1;
let gameOver = false;
let gameTimer = 0;

const camera = { x: 0, y: 0, zoom: 1 };

function updateCamera() {
    const targetZoom = Math.max(0.25, 1.3 - player.radius / 220);
    camera.zoom += (targetZoom - camera.zoom) * 0.05;
    camera.x = player.x - canvas.width / 2 / camera.zoom;
    camera.y = player.y - canvas.height / 2 / camera.zoom;
}

function drawGrid() {
    const gridSize = 100;
    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    ctx.lineWidth = 1;
    for (let x = 0; x < world.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo((x - camera.x) * camera.zoom, 0);
        ctx.lineTo((x - camera.x) * camera.zoom, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y < world.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, (y - camera.y) * camera.zoom);
        ctx.lineTo(canvas.width, (y - camera.y) * camera.zoom);
        ctx.stroke();
    }
}

function collectParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        const dist = Math.hypot(player.x - p.x, player.y - p.y);
        if (dist < player.radius + p.radius) {
            player.radius += p.energy * 0.4;
            particles.splice(i, 1);
            particles.push(new Particle());
        }
    }
}

function updateHUD() {
    document.getElementById("sizeText").innerText =
        "Tamanho: " + Math.floor(player.radius) + " | Dificuldade: " + difficultyLevel;
    const cd = Date.now() - player.lastDash;
    document.getElementById("dashText").innerText =
        cd >= player.dashCooldown ? "Dash: Pronto" : "Dash: Recarregando";
}

function restartGame() {
    player.x = world.width / 2;
    player.y = world.height / 2;
    player.radius = 20;
    difficultyLevel = 1;
    gameTimer = 0;
    initGame();
    gameOver = false;
}

function updateDifficulty() {
    gameTimer++;
    if (gameTimer % 900 === 0) {
        difficultyLevel++;
        enemies.push(new Enemy());
        if (difficultyLevel % 2 === 0) drainEnemies.push(new DrainEnemy());
    }
}

function drawGameOver() {
    ctx.fillStyle = "rgba(0,0,0,0.8)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.textAlign = "center";
    ctx.font = "bold 64px Arial";
    ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);
    ctx.font = "24px Arial";
    ctx.fillText("Você colidiu com um obstáculo ou inimigo fatal!", canvas.width / 2, canvas.height / 2 + 10);
    ctx.font = "28px Arial";
    ctx.fillText("Pressione ENTER para reiniciar", canvas.width / 2, canvas.height / 2 + 70);
}

window.addEventListener("keydown", e => {
    if (gameOver && e.key === "Enter") restartGame();
});

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameOver) {
        player.update();
        updateDifficulty();
        collectParticles();
        
        // Verifica colisão com as barras
        for (const wall of walls) {
            if (wall.checkCollision(player)) {
                gameOver = true;
            }
        }
    }

    updateCamera();
    drawGrid();

    // Desenha as barras
    for (const wall of walls) {
        wall.draw(camera);
    }

    for (const p of particles) p.draw(camera);

    for (const enemy of enemies) {
        if (!gameOver) enemy.update(player);
        enemy.draw(camera);
    }

    for (const drainEnemy of drainEnemies) {
        if (!gameOver) drainEnemy.update(player);
        drainEnemy.draw(camera);
    }

    player.draw(camera);

    if (gameOver) drawGameOver();

    updateHUD();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
