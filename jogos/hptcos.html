<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joguim do Réuri</title>
    <style>
        body {
            background-color: #121212;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
        }

        #emulator-container {
            width: 720px;
            height: 480px;
            max-width: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 2px solid #333;
        }

        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- O contêiner onde o emulador será injetado -->
    <div id="emulator-container">
        <div id="game"></div>
    </div>

    <div class="instructions">
        Pressione a tela do jogo para iniciar o áudio<br>
        Controles padrão: Setas | Z = (A) | X = (B) | Enter = (Start) | Shift = (Select) | Q = (L) | E = (R)
    </div>

    <!-- Configuração do Emulador -->
    <script>
        // Define onde o jogo vai renderizar
        EJS_player = '#game';
        
        // Define o console como Game Boy Advance
        EJS_core = 'gba'; 
        
        // =========================================================
        // CAMINHO DO JOGO (Altere para o nome do seu arquivo .gba)
        // =========================================================
        EJS_gameUrl = 'assets/jogohp.gba'; 

        // Define o tema e configurações de interface
        EJS_color = '#e74c3c'; // Cor do botão de play
        EJS_startOnLoaded = true; // Inicia automaticamente ao carregar a página
        
        // Caminho oficial estável para os motores do emulador (WASM)
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    </script>

    <!-- Script principal que carrega o motor -->
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
